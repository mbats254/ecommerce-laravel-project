x-app: &app
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    target: app
  image: anchor-api-app
  working_dir: /var/www/html
  env_file: .env
  environment:
    DB_HOST: mysql
    DB_PORT: 3306
    REDIS_HOST: redis
    REDIS_PORT: 6379
    MEILISEARCH_HOST: http://meilisearch:7700
  volumes:
    - .:/var/www/html:cached
    - vendor:/var/www/html/vendor
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - anchor

services:
  app:
    <<: *app
    container_name: anchor-api-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  webserver:
    image: nginx:1.27-alpine
    container_name: anchor-api-webserver
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html/public:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - anchor

  horizon:
    <<: *app
    container_name: anchor-api-horizon
    command: ["php", "artisan", "horizon"]

  scheduler:
    <<: *app
    container_name: anchor-api-scheduler
    command: ["php", "artisan", "schedule:work"]

  mysql:
    image: mysql:8.0
    container_name: anchor-api-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - anchor

  redis:
    image: redis:7-alpine
    container_name: anchor-api-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - anchor

  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: anchor-api-meilisearch
    environment:
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7701:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - anchor

networks:
  anchor:
    driver: bridge

volumes:
  vendor:
  mysql-data:
  redis-data:
  meilisearch-data:
